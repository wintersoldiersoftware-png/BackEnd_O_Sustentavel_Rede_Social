version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "8000:8000"
    # Carrega as variáveis de ambiente do arquivo .env
    env_file:
      - .env
    # Variáveis de ambiente adicionais
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Monta o diretório atual para desenvolvimento
      - .:/app
    restart: unless-stopped
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
